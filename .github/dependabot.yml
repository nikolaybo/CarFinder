version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
      types:
        patterns:
          - "@types/*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
