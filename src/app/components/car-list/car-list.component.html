<div class="car-grid-wrap container mx-auto">

  @if (isLoading() && cars().length === 0) {
    <div class="car-grid-wrap__spinner" role="status" aria-label="Loading cars">
      <mat-spinner diameter="52"></mat-spinner>
      <p class="car-grid-wrap__spinner-text">{{ 'listing.loading' | translate }}</p>
    </div>
  }

  <div class="car-grid">
    @for (car of cars(); track car.id) {
      <app-car-item [car]="car" />
    }
  </div>

  <div class="car-grid-wrap__more">
    @if (hasMoreCars()) {
      <button
        class="car-grid-wrap__more-btn"
        mat-flat-button
        [disabled]="isLoading()"
        (click)="loadCars()"
        aria-label="Load more cars"
      >
        @if (isLoading()) {
          <ng-container>
            <mat-spinner diameter="18" color="accent"></mat-spinner>
            Loading…
          </ng-container>
        } @else {
          <ng-container>
            <mat-icon role="none" class="max-h-4">expand_more</mat-icon>
            {{ 'listing.more' | translate }}
          </ng-container>
        }
      </button>
    }
  </div>

</div>
