<header class="site-header" role="banner">
  <div class="site-header__inner container mx-auto">
    <a [routerLink]="['/']" class="site-header__logo"
       aria-label="Car Finder — Go to homepage">
      <img class="site-header__logo-img" [src]="logo" width="148" height="44"
           alt="Car Finder logo" fetchpriority="high">
    </a>

    <div class="site-header__search">
      <app-search></app-search>
    </div>

    <app-menu></app-menu>

    <button class="site-header__lang-switch" (click)="toggleLocale()" [attr.aria-label]="'Switch language to ' + ('lang.switch' | translate)">
      {{ 'lang.switch' | translate }}
    </button>
  </div>
</header>
